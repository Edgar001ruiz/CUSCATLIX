<!DOCTYPE html>
<html lang="en">

<head>
<link rel="stylesheet" href="css/contact.css">
</head>

<body>
<h2>Contacto Cuscatlix</h2>
<form>
<fieldset>
<legend>Datos de contacto</legend>
<label for="nombre">Nombre:</label><br>
<input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>

<br><br>

<label for="correo">Correo:</label><br>
<input type="email" id="correo" name="correo" placeholder="correo@email.com" required>

<br><br>

<label for="telefono">Teléfono:</label><br>
<input type="tel" id="telefono" name="telefono" required>

<br><br>

<label for="tema">Selecciona punto de consulta:</label><br>
<select id="tema" name="tema" required>
<option>Leyendas Cuscatlecas</option>
<option>Enviar historia</option>
<option>Dudas</option>
<option>Otro</option>
</select>

<br><br>

<label for="mensaje">Deja tu comentario</label><br>
<textarea id="mensaje" name="mensaje" rows="5" cols="30"></textarea>

<br><br>

<input type="submit" value="Enviar">
<input type="reset" value="Borrar">

</fieldset>

</form>
<footer>
    <table id="redes">
<tr>

<td><img src="img/fb.png" alt="Facebook"></td>
<td><img src="img/tw.png" alt="Twitter"></td>
<td><img src="img/yt.png" alt="YouTube"></td>
</tr>
</table>
    <p>Copyright © 2026 Grupo Cuscatlix.</p>
</footer>
</body>
</html>
